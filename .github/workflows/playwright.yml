name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ─── Smoke Tests — runs on every push and PR ──────────────────
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create environment file
        run: |
          mkdir -p config/environments
          cat > config/environments/dev.env << EOF
          BASE_URL=${{ secrets.BASE_URL }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          ENV=dev
          TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_FIRST_NAME=${{ secrets.TEST_USER_FIRST_NAME }}
          TEST_USER_LAST_NAME=${{ secrets.TEST_USER_LAST_NAME }}
          ADMIN_USER_EMAIL=${{ secrets.ADMIN_USER_EMAIL }}
          ADMIN_USER_PASSWORD=${{ secrets.ADMIN_USER_PASSWORD }}
          ADMIN_USER_FIRST_NAME=${{ secrets.ADMIN_USER_FIRST_NAME }}
          ADMIN_USER_LAST_NAME=${{ secrets.ADMIN_USER_LAST_NAME }}
          EOF

      - name: Run smoke tests
        run: npx playwright test --project=api --grep @smoke

      - name: Run UI smoke tests (may fail due to Cloudflare protection)
        continue-on-error: true
        run: npx playwright test --project=chromium --grep @smoke

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-playwright-report
          path: reports/html/
          retention-days: 7

      - name: Upload Allure results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-allure-results
          path: allure-results/
          retention-days: 7

  # ─── Regression Tests — runs on push to master only ───────────
  regression:
    name: Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create environment file
        run: |
          mkdir -p config/environments
          cat > config/environments/dev.env << EOF
          BASE_URL=${{ secrets.BASE_URL }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          ENV=dev
          TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_FIRST_NAME=${{ secrets.TEST_USER_FIRST_NAME }}
          TEST_USER_LAST_NAME=${{ secrets.TEST_USER_LAST_NAME }}
          ADMIN_USER_EMAIL=${{ secrets.ADMIN_USER_EMAIL }}
          ADMIN_USER_PASSWORD=${{ secrets.ADMIN_USER_PASSWORD }}
          ADMIN_USER_FIRST_NAME=${{ secrets.ADMIN_USER_FIRST_NAME }}
          ADMIN_USER_LAST_NAME=${{ secrets.ADMIN_USER_LAST_NAME }}
          EOF

      - name: Run API regression tests
        run: npx playwright test --project=api

      - name: Run UI regression tests (may fail due to Cloudflare protection)
        continue-on-error: true
        run: npx playwright test --project=chromium

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 30

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
