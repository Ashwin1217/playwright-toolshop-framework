name: Playwright Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create environment file
        run: |
          mkdir -p config/environments
          cat > config/environments/dev.env << EOF
          BASE_URL=${{ secrets.BASE_URL }}
          API_BASE_URL=${{ secrets.API_BASE_URL }}
          ENV=dev
          TEST_USER_EMAIL=${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD=${{ secrets.TEST_USER_PASSWORD }}
          TEST_USER_FIRST_NAME=${{ secrets.TEST_USER_FIRST_NAME }}
          TEST_USER_LAST_NAME=${{ secrets.TEST_USER_LAST_NAME }}
          ADMIN_USER_EMAIL=${{ secrets.ADMIN_USER_EMAIL }}
          ADMIN_USER_PASSWORD=${{ secrets.ADMIN_USER_PASSWORD }}
          ADMIN_USER_FIRST_NAME=${{ secrets.ADMIN_USER_FIRST_NAME }}
          ADMIN_USER_LAST_NAME=${{ secrets.ADMIN_USER_LAST_NAME }}
          EOF

      - name: Run Playwright tests
        run: npx playwright test --project=chromium --reporter=html

      - name: Upload HTML report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: reports/html/
          retention-days: 15
